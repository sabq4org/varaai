<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VARA — دقّة الرياضة</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #121821;
      --surface-2: #1a222e;
      --line: #232c3a;
      --text: #eaf0f7;
      --muted: #8b97a8;
      --accent: #00e0a4;
      --accent-dim: #0c6b54;
      --win: #00e0a4;
      --draw: #c9a227;
      --lose: #ff5d6c;
      --gold: #ffd166;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "SF Pro", "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(1200px 600px at 80% -10%, #10202b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px 40px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 22px 4px 18px;
    }
    .logo {
      font-weight: 800; font-size: 28px; letter-spacing: 1px;
      background: linear-gradient(120deg, #fff, var(--accent));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .logo .bar { color: var(--accent); -webkit-text-fill-color: var(--accent); }
    .tag { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .league-pill {
      margin-inline-start: auto; display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--line);
      padding: 8px 12px; border-radius: 999px; font-size: 13px; color: var(--muted);
    }
    .league-pill img { width: 20px; height: 20px; object-fit: contain; }
    .tabs { display: flex; gap: 8px; margin: 8px 0 18px; }
    .tab {
      flex: 1; text-align: center; padding: 12px; border-radius: 14px;
      background: var(--surface); border: 1px solid var(--line);
      color: var(--muted); font-weight: 700; cursor: pointer; transition: .2s;
    }
    .tab.active { background: linear-gradient(180deg, var(--surface-2), var(--surface)); color: var(--text); border-color: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent-dim) inset; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
    /* Standings */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 10px; font-size: 14px; text-align: center; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--line); }
    td:nth-child(2), th:nth-child(2) { text-align: start; }
    tr:not(:last-child) td { border-bottom: 1px solid #1a2230; }
    .rank { width: 28px; height: 28px; line-height: 28px; border-radius: 8px; display: inline-block; font-weight: 800; background: var(--surface-2); }
    tr.ucl .rank { background: var(--accent-dim); color: #d8fff3; }
    .team { display: flex; align-items: center; gap: 10px; font-weight: 600; }
    .team img { width: 24px; height: 24px; object-fit: contain; }
    .pts { font-weight: 800; color: var(--accent); }
    .form { display: inline-flex; gap: 3px; }
    .dot { width: 16px; height: 16px; border-radius: 5px; font-size: 10px; line-height: 16px; font-weight: 800; color: #08110d; }
    .dot.W { background: var(--win); } .dot.D { background: var(--draw); } .dot.L { background: var(--lose); color:#fff; }
    .hide-sm { }
    @media (max-width: 520px){ .hide-sm{ display:none; } }
    /* Results */
    .match { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding: 14px 16px; }
    .match:not(:last-child){ border-bottom: 1px solid #1a2230; }
    .side { display:flex; align-items:center; gap:10px; }
    .side.home { justify-content: flex-end; }
    .side img { width: 26px; height: 26px; object-fit: contain; }
    .side .nm { font-weight: 600; font-size: 14px; }
    .score { font-weight: 800; font-size: 18px; min-width: 64px; text-align:center; background: var(--surface-2); border:1px solid var(--line); border-radius: 10px; padding: 6px 8px; }
    .score .ft { display:block; font-size:9px; color:var(--muted); font-weight:600; letter-spacing:1px; }
    .meta { text-align:center; color: var(--muted); font-size: 12px; padding: 10px; }
    .loading, .error { text-align:center; padding: 40px; color: var(--muted); }
    .error { color: var(--lose); }
    .src { text-align:center; color:#5a6678; font-size:11px; margin-top:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="logo">VA<span class="bar">R</span>A</div>
        <div class="tag">دقّة الرياضة — Prototype</div>
      </div>
      <div class="league-pill" id="leaguePill">دوري روشن السعودي</div>
    </header>

    <div class="tabs">
      <div class="tab active" data-tab="standings">الترتيب</div>
      <div class="tab" data-tab="results">النتائج</div>
    </div>

    <div class="card" id="content"><div class="loading">جارٍ التحميل…</div></div>
    <div class="src" id="src"></div>
  </div>

  <script>
    const API = location.origin;
    let state = { standings: null, results: null, source: "", cached: false };

    function dot(ch){ return `<span class="dot ${ch}">${ch}</span>`; }
    function formHtml(form){
      if(!form) return "";
      return '<span class="form">' + form.split("").map(dot).join("") + "</span>";
    }

    function renderStandings(){
      const s = state.standings;
      if(!s){ return '<div class="loading">لا يوجد ترتيب</div>'; }
      const rows = s.rows.map(r => `
        <tr class="${r.rank<=3?'ucl':''}">
          <td><span class="rank">${r.rank}</span></td>
          <td><div class="team">${r.team.logo?`<img src="${r.team.logo}">`:""}<span>${r.team.name}</span></div></td>
          <td>${r.played}</td>
          <td class="hide-sm">${r.win}-${r.draw}-${r.lose}</td>
          <td class="hide-sm">${r.goalsDiff>0?"+":""}${r.goalsDiff}</td>
          <td class="hide-sm">${formHtml(r.form)}</td>
          <td class="pts">${r.points}</td>
        </tr>`).join("");
      return `<table>
        <thead><tr><th>#</th><th>الفريق</th><th>لعب</th><th class="hide-sm">ف-ت-خ</th><th class="hide-sm">+/-</th><th class="hide-sm">الأخيرة</th><th>نقاط</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }

    function renderResults(){
      const list = state.results;
      if(!list || !list.length){ return '<div class="loading">لا توجد نتائج</div>'; }
      return list.map(m => {
        const d = new Date(m.startTime);
        const date = d.toLocaleDateString("ar-SA", { month:"short", day:"numeric" });
        return `<div class="match">
          <div class="side home"><span class="nm">${m.home.team.name}</span>${m.home.team.logo?`<img src="${m.home.team.logo}">`:""}</div>
          <div class="score">${m.home.score ?? "-"} : ${m.away.score ?? "-"}<span class="ft">${date}</span></div>
          <div class="side away">${m.away.team.logo?`<img src="${m.away.team.logo}">`:""}<span class="nm">${m.away.team.name}</span></div>
        </div>`;
      }).join("");
    }

    function render(tab){
      const el = document.getElementById("content");
      el.innerHTML = tab === "results" ? renderResults() : renderStandings();
      document.getElementById("src").textContent =
        `المصدر: ${state.source} · ${state.cached ? "من الكاش" : "مباشر"}`;
    }

    async function load(){
      try {
        const res = await fetch(`${API}/v1/saudi-pro-league/overview`);
        const json = await res.json();
        if(json.error) throw new Error(json.error);
        state.standings = json.data.standings;
        state.results = json.data.results;
        state.source = json.source;
        state.cached = json.cached;
        const lg = json.data.standings.competition;
        if(lg.logo){ document.getElementById("leaguePill").innerHTML = `<img src="${lg.logo}"> ${lg.name}`; }
        render("standings");
      } catch(e){
        document.getElementById("content").innerHTML = `<div class="error">خطأ: ${e.message}</div>`;
      }
    }

    document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      render(t.dataset.tab);
    }));

    load();
  </script>
</body>
</html>
